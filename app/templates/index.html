<!DOCTYPE html>
<html>
<head>
    <title>Fake Review Detector</title>

    <style>
        body {
            font-family: Arial;
            transition: 0.3s;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }

        .dark-mode {
            background: #121212;
            color: white;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 50%;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }

        .dark-mode .container {
            background: #1e1e1e;
        }

        textarea {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
        }

        button {
            background: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .confidence {
            margin-top: 10px;
            font-size: 18px;
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #007BFF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .toggle {
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>

    <script>
        function showLoader() {
            document.getElementById("loader").style.display = "block";
        }

        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }
    </script>

</head>

<body>

<div class="toggle">
    <button onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>
</div>

<div class="container">
    <h1>🧠 Fake Review Detector</h1>

    <form method="POST" onsubmit="showLoader()">
        <textarea name="review" rows="5" placeholder="Enter your review..."></textarea>
        <br><br>
        <button type="submit">Analyze Review</button>
    </form>

    <div id="loader" class="loader"></div>

    {% if result %}
        <div class="result">{{ result }}</div>
        <div class="confidence">Confidence: {{ confidence }}%</div>
    {% endif %}
</div>

</body>
</html>
